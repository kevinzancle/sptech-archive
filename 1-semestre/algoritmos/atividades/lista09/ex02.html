<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Carona Compartilhada:</h1>
    <span>Digite a quantidade de pessoas que vão viajar: </span>
    <input type="number" id="ipt_qtd">
    <button onclick="verificar()">#PartiuCarona</button>
    <div id="divMensagem"></div>
</body>
</html>
<script>
    function verificar(){
        divMensagem.innerHTML = ""
        let qtd = Number(ipt_qtd.value)
        for (let i = 1; i <= qtd; i++) {
            if(i == 1){
                divMensagem.innerHTML += "O ${i} passageiro entrou (motorista) <br>"
                i = 2
            }
            if(i >= 2 && i<=5){
                divMensagem.innerHTML += `O ${i} Passageiro entrou <br>`
            }else if(i>=6){
                divMensagem.innerHTML += `O ${i} terá que esperar<br>`
            }
            
        }
        
    }
</script>
