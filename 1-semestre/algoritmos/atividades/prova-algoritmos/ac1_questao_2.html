<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Questão 2</title>
</head>
<body>
   <h2>Questão 2</h2>
   
   <span>Quantidade de Energia Consumida (kWh): </span>
   <input type="text" id="input_kwh"> <br>

   <span>Bandeira Tarifária de Energia: </span>
   <input type="text" id="input_bandeira"> <br>

   <button onclick="calcular()">Calcular Despesa</button>

   <div id="div_mensagem"></div>
</body>
</html>

<script>
/* Faça sua lógica aqui! Não altere o HTML. */
function calcular() {
   div_mensagem.innerHTML = ""

   let qtd_kwh = Number(input_kwh.value)
   let bandeira_tarifaria = input_bandeira.value
   let valor_total = 0

   if(bandeira_tarifaria == "verde"){
      valor_total += (qtd_kwh*0.75)
   }else if(bandeira_tarifaria == "amarela"){
      valor_total += (qtd_kwh*0.9)
   }else if(bandeira_tarifaria == "vermelha"){
      valor_total += (qtd_kwh*1.15)
   }

   if(qtd_kwh <= 100){
      valor_total = valor_total - 15
   }

   div_mensagem.innerHTML = `Com o consumo de ${qtd_kwh.toFixed(2)} kWh na bandeira ${bandeira_tarifaria}, a conta de energia totaliza R$ ${valor_total.toFixed(2)}`
}
</script>
