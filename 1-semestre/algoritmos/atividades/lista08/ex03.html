<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>3. Frase Numerada</h1>
    <input type="text" id="ipt_frase">
    <button onclick="frase()">Diga algo sobre a matéria de algoritmos</button>
    <div id="exibir_mensagem"></div>
</body>
</html>
<script>
    function frase(){
        contador = 1
        while (contador <= 7) {
            exibir_mensagem.innerHTML += `${contador} - ${ipt_frase.value} <br>`
            contador ++
        }
    }
</script>
