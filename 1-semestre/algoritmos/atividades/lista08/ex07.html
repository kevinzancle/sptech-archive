<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>7. Viva o 7!</h1>
    <span>Digite o número limite: </span>
    <input type="text" id="ipt_limite">
    <button onclick="calcular()">Viva o 7!</button>
    <div id="exibir_mensagem"></div>
</body>
</html>
<script>
    function calcular(){
        let contador = 0
        let limite = Number(ipt_limite.value)
        let valor = 0

        if(limite>=0 && limite <=200){
            while (valor < limite -7) {
            
            valor = contador * 7
            exibir_mensagem.innerHTML += `${valor} <br>`
            contador ++
        }
        }else{
            alert("O número deve estar entre 0 e 200")
        }
        
    }
</script>
