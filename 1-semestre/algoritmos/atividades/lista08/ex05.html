<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>5. Números Misteriosos</h1>
    <button onclick="contar()">Números cabalísticos</button>
    <div id="exibir_mensagem"></div>
</body>
</html>
<script>
    function contar(){
        let contador = 0

        while (contador < 3) {
            exibir_mensagem.innerHTML += contador + "<br>"
            contador ++
        }

        contador = 5

        while (contador < 7) {
            exibir_mensagem.innerHTML += contador + "<br>"
            contador ++
        }

        contador = 8

        while (contador < 10) {
            exibir_mensagem.innerHTML += contador + "<br>"
            contador ++
        }

        contador = 11

        while (contador < 12) {
            exibir_mensagem.innerHTML += contador + "<br>"
            contador ++
        }

        contador = 13

        while (contador <= 30   ) {
            exibir_mensagem.innerHTML += contador + "<br>"
            contador ++
        }
    }
</script>
