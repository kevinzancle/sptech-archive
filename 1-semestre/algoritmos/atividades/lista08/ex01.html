<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>1. Contagem Simples</h1>
    <button onclick="contar()">Contar</button>
    <div id="exibir_mensagem"></div>
</body>
</html>
<script>
    function contar(){
        contador = 1
        while (contador <= 15) {
            exibir_mensagem.innerHTML += `${contador} <br>`
            contador ++
        }
    }
</script>
