<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>8. Papagaio Falante</h1>
    <span>Digite um número: </span>
    <input type="text" id="ipt_numero">
    <span>Digite uma frase: </span>
    <input type="text" id="ipt_frase">
    <button onclick="papagaio()">PAPAGAIO</button>

</body>
</html>
<script>
    function papagaio(){

        let numero = Number(ipt_numero.value)
        let frase = ipt_frase.value
        contador = 0
        while (contador<numero) {
            alert(`${frase} <br>`)
            contador++
        }
    }
</script>
