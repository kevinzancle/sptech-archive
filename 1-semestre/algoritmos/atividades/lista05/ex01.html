<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h1>Altura e Esportes: Descubra Sua Vantagem Competitiva</h1>
    <span>Digite a sua altura: </span>
    <input type="number" id="ipt_altura">
    <button onclick="analisar()">Analisar Estatura</button>
    <div id="div_exibir"></div>
</body>
</html>
<script>
    function analisar(){
        let altura_usuario = Number(ipt_altura.value)
        div_exibir.innerHTML = ""
        if (altura_usuario>0 & altura_usuario < 165){
            div_exibir.innerHTML = `Você pode ser piloto de corrida`
        }else if(altura_usuario > 165 & altura_usuario <= 180){
            div_exibir.innerHTML = `Você pode ser jogador de futebol`
        }else if(altura_usuario> 180 & altura_usuario < 240){
            div_exibir.innerHTML = `Você pode ser jogador de vôlei ou basquete`
        }else{
             div_exibir.innerHTML = `Altura inválida`
        }
    }
</script>
