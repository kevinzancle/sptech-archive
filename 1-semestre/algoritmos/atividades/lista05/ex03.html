<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <h1>Sensação Térmica: Como o Corpo Humano Percebe a Temperatura</h1>
    <span>Digite a temperatura que deseja verificar: </span>
    <input type="number" id="ipt_temperatura">
    <button onclick="verificar()">Verificar</button>
    <div id="exibir_mensagem"></div>
</body>
</html>
<script>
    function verificar(){
        exibir_mensagem.innerHTML = ""
        let temperatura = Number(ipt_temperatura.value)
        let sensacao = ""
        if(temperatura < 14){
            sensacao += "Congelante"
        }else if(temperatura <= 21){
            sensacao += "Com frio"
        }else if(temperatura <= 24){
            sensacao += "Confortável"
        }else if(temperatura <= 31){
            sensacao += "Com calor"
        }else{
            sensacao += "Calor escaldante"
        }
        exibir_mensagem.innerHTML = sensacao
    }
</script>
