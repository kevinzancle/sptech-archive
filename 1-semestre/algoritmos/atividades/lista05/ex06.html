<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Times Paulistas: O Canto da Sua Torcida!</h1>
    <span>Para qual time de São Paulo você torce?</span>
    <input type="text" id="ipt_time">
    <button onclick="exibir()">Fale sobre esse time</button>
    <div id="div_exibir_mensagem"></div>
</body>
</html>
<script>
    function exibir(){
        div_exibir_mensagem = ""
        let time = ipt_time.value
        if(time == "sao paulo"){
            div_exibir_mensagem.innerHTML += `<p style="color: red; background-color: black">Salve o Tricolor paulista</p>`
        }else if(time == "corinthians"){
            alert("ds")
            div_exibir_mensagem.innerHTML += `<p style="color: white; background-color: black">Salve o Corinthians</p>`
        }else if(time == "palmeiras"){
            div_exibir_mensagem.innerHTML += `<p style="color: white; background-color: green">Salve o alviverde imponente</p>`
        }else if(time == "santos"){
            div_exibir_mensagem.innerHTML += `<p style="color: black; background-color: white">Agora quem dá a bola é o Santos</p>`
        }
    }
</script>
