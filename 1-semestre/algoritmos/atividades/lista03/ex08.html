<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    <h1>Banco Virtual: Depósitos e Retiradas</h1>
    <span>Digite o valor a ser retirado/depositado: </span>
    <input type="number" id="valor">
    <br>
    <button onclick="deposito()">DEPOSITAR</button>
    <button onclick="retirada()">RETIRAR</button>
    <div id="exibir">R$0</div>
    <div id="situacao"></div>
</body>
</html>
<script>
    saldo = 0
    function deposito(){
        saldo += Number(valor.value)
        exibir.innerHTML = `RS${saldo}`
        situacao.innerHTML = `Depósito de R$${valor.value} concluído` 
    }
    function retirada(){
        saldo -= Number(valor.value)
        exibir.innerHTML = `RS${saldo}`
        situacao.innerHTML = `Retirada de R$${valor.value} concluído`
    }
</script>
