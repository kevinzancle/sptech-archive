<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <span>Insira o primeiro número: </span>
    <input type="number" id="ipt_number1">
    <br>
    <span>INsira o segundo número: </span>
    <input type="number" id="ipt_number2">
    <br>
    <button onclick="calcular_soma()">SOMA</button>
    <button onclick="calcular_sub()">SUBTRAÇÂO</button>
    <button onclick="calcular_multi()">MULTIPLICAÇÂO</button>
    <button onclick="calcular_div()">DIVISÂO</button>
    <br>
    <p id="exibir_resultado"></p>
</body>
</html>
<script>
    function calcular_soma() {
        exibir_resultado.innerHTML = "A soma entre " + ipt_number1.value + " e " + ipt_number2.value + " é: " + (Number(ipt_number1.value) + Number(ipt_number2.value))
    }
    function calcular_sub() {
        exibir_resultado.innerHTML = "A subtração entre " + ipt_number1.value + " e " + ipt_number2.value + " é: " + + (Number(ipt_number1.value) - Number(ipt_number2.value))
    }
    function calcular_multi() {
        exibir_resultado.innerHTML = "O produto entre " + ipt_number1.value + " e " + ipt_number2.value + " é: " + (Number(ipt_number1.value) * Number(ipt_number2.value))
    }
    function calcular_div() {
        exibir_resultado.innerHTML = "A razão entre " + ipt_number1.value + " e " + ipt_number2.value + " é: " + (Number(ipt_number1.value) / Number(ipt_number2.value))
    }
    
</script>
