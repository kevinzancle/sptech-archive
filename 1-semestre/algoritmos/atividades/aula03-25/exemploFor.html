<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="mostrarMensagem()">Mostrar Mensagem</button>
    <div id="div_while"></div>
    <div id="div_for"></div>
</body>
</html>
<script>
    function mostrarMensagem(){
        div_while.innerHTML = ""
        
        let contador = 0

        while (contador<10) {
            div_while.innerHTML += contador + "<br>"
            contador ++
        }

        div_for.innerHTML += "------------------------------------------------- <br>"

        for (let i = 0; i < 10; i++) {
            div_for.innerHTML += i + "<br>"
            
        }
    }
</script>
