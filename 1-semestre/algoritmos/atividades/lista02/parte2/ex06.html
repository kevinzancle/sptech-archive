<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Farol</h1>
    <button onclick="pare()">PARE</button>
    <button onclick="pense()">PENSE</button>
    <button onclick="siga()">SIGA</button>
    <p id="p_mensagem"></p>
</body>
</html>
<Script>
    function pare() {
        p_mensagem.innerHTML = "Pare e aguarde!"
    }
    function pense() {
        p_mensagem.innerHTML = "Pense se pode seguir ou se deve parar!"
    }
    function siga() {
        p_mensagem.innerHTML = "Pode seguir adiante!"
    }
</Script>
