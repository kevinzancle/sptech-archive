<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <h1>Média Escolar de Paty</h1>
    <span>Digite o valor da nota 1: </span>
    <input type="number" id="ipt_nota1">
    <br>
    <span>Digite o valor da nota 2: </span>
    <input type="number" id="ipt_nota2">
    <br>
    <span>Digite o valor da nota 3: </span>
    <input type="number" id="ipt_nota3">
    <br>
    <button onclick="calcular()">Analisar Desempenho</button>
    <div id="exibir"></div>
</body>
</html>
<script>
    function calcular(){
        let nota1 = Number(ipt_nota1.value)
        let nota2 = Number(ipt_nota2.value)
        let nota3 = Number(ipt_nota3.value)

        let media = (nota1+nota2+nota3)/3

        if (media > 9.4){
            exibir.innerHTML = `Sua média foi ${media.toFixed(2)}. Parabéns, você é fora de séroe`
        }else{
            exibir.innerHTML = `Sua média foi de ${media.toFixed(2)}.`
        }
    }
</script>
