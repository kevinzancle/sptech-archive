<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    <h1>Cheque Especial do Banco XPTO</h1>
    <span>Digite o saldo da conta: </span>
    <input type="number" id="ipt_saldo">
    <br>
    <span>Digite o valor do débito: </span>
    <input type="number" id="ipt_debito">
    <br>
    <button onclick="analisar()">Analisar Conta</button>
    <div id="exibir"></div>
</body>
</html>
<script>
    function analisar(){
        let saldo = Number(ipt_saldo.value)
        let debito = Number(ipt_debito.value)
        let saldo_final = saldo-debito
        if(saldo_final<0){
            exibir.innerHTML = `<b style ="color: red" >O saldo era de R$${saldo}, após a retirada o novo saldo será de R$${saldo_final}.</b>`
        }else{
            exibir.innerHTML = `O saldo era de R$${saldo}, após a retirada o novo saldo será de R$${saldo_final}.`
        }
    }
</script>
