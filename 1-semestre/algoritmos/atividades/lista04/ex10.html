<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10</title>
</head>
<body>
    <h1>Situação Financeira da Conta Bancária</h1>
    <span>Digite o seu saldo no banco: </span>
    <input type="text" id="ipt_saldo">
    <br>
    <button onclick="verificar()">Verificar Finanças</button>
    <div id="exibir"></div>
</body>
</html>
<script>
    function verificar(){
        let saldo = Number(ipt_saldo.value)
        if(saldo == 0){
            exibir.innerHTML = `Conta Zerada`
        }
        if(saldo < 0){
            exibir.innerHTML = `<p style = "color: red">Está devendo!</p>`
        }
        if(saldo > 0){
            exibir.innerHTML = `<p style = "color: blue">Saldo positivo! :)</p>`
        }
    }
</script>
