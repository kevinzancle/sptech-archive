<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Análise de Financiamento Habitacional </h1>
    <span>Digite o valor da renda familiar: </span>
    <input type="number" id="ipt_valor_renda">
    <span>Digite o valor da prestação: </span>
    <input type="number" id="ipt_valor_prestacao">
    <br>
    <button onclick="verificar()">Verificar Financiamento</button>
    <div id="exibir"></div>  
</body>
</html>
<script>
    function verificar(){
        let renda = Number(ipt_valor_renda.value)
        let prestacao = Number(ipt_valor_prestacao.value)
        let porcentagem = (prestacao/renda) * 100

        exibir.innerHTML = `A prestação corresponde a ${porcentagem.toFixed(2)}% da renda familiar. <br>`

        if(porcentagem>30){
            exibir.innerHTML += `<b style = "color: red">Será necessário complementar a renda familiar</b>`
        }
    }
</script>
