<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 13</title>
</head>
<body>
    <h1>Verificação de Média: Aprovado ou Reprovado?</h1>
    <span>Digite a primeira nota: </span>
    <input type="number" id="ipt_primeiraNota">
    <br>
    <span>Digite a segunda nota: </span>
    <input type="number" id="ipt_segundaNota">
    <br>
    <button onclick="verificar()">Verificar Situação</button>
</body>
</html>
<script>
    function verificar(){
        media = (Number(ipt_primeiraNota.value) + Number(ipt_segundaNota.value))/2
        if(media>=6){
            alert("Parabéns, aprovado!")
        }else{
            alert("Tente outra vez...")
        }
    }
</script>
