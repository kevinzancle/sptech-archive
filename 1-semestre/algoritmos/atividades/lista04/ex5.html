<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h1>Cálculo da Conta de Luz</h1>
    <span>Digiet a quantidade de KWh consumida no mês: </span>
    <input type="number" id="ipt_qtd_kwh">
    <button onclick="calcular()">Calcular Conta de Luz</button>
    <div id="exibir"></div>
</body>
</html>
<script>
    function calcular(){
        let quantidade = Number(ipt_qtd_kwh.value)
        let valor = quantidade*0.85

        if(quantidade < 100){
            exibir.innerHTML = `Foram consumidos ${quantidade}KWh. Totalizando R$${valor*0.9} para serem pagos`
        }else{
            exibir.innerHTML = `Foram consumidos ${quantidade}KWh. Totalizando R$${valor} para serem pagos`
        }
        
    }
</script>
