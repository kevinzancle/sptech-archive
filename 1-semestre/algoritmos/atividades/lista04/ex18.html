<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 18</title>
</head>
<body>
    <h1>Cálculo de Média: Aprovado ou Reprovado?</h1>
    <span>Digite sua primeira nota: </span>
    <input type="text" id="ipt_nota1">
    <span>Digite sua segunda nota: </span>
    <input type="text" id="ipt_nota2">
    <button onclick="verificar()">Verificar Situação</button>
    <div id="div_exibir_media"></div>
    <div id="div_exibir_situacao"></div>
</body>
</html>
<script>
    function verificar(){
        let nota1 = Number(ipt_nota1.value)
        let nota2 = Number(ipt_nota2.value)

        let media = (nota1+nota2)/2
        div_exibir_media.innerHTML = `Média: ${media}`

        if(media >= 6){
            div_exibir_situacao.innerHTML = `Parabéns, aprovado!`
        }else{
            div_exibir_situacao.innerHTML = `Tente outra vez...`
        }
    }
</script>
