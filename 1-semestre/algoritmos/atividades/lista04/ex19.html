<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 19</title>
</head>
<body>
    <h1>Verificação de Clima: Alimentos em Bom Estado ou Estragados?</h1>
    <span>Digite a temperatura do ambiente: </span>
    <input type="text" id="ipt_temperatura_ambiente">
    <button onclick="verificar()">Verificar Clima</button>
    <div id="exibir_mensagem"></div>
</body>
</html>
<script>
    function verificar(){
        exibir_mensagem.innerHTML = ""
        temperatura = Number(ipt_temperatura_ambiente.value)
        if(temperatura < 10){
            exibir_mensagem.innerHTML = '<img  width = "500px"src = "https://blog.belagro.com.br/content/uploads/2019/11/Rastreabilidade-de-vegetais-frescos-750x422.jpg"></img>' +'<br>'+ '<b>Apropriado</b>'
        }else{
            exibir_mensagem.innerHTML = '<img  width = "500px"src = "https://www.brazilhealth.com/assets/images/content/news/825/1200x800/alimentos-estragados-riscos-que-vao-alem-do-desconforto-gastrointestinal.jpg"></img>' +'<br>'+ '<b>Inapropriado</b>'
        }
    }
</script>
