<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 8</title>
</head>
<body>
    <h1>Peso Médio no Elevador</h1>
    <span>Digite a quantidade de homens que entraram no elevador: </span>
    <input type="text" id="ipt_qtdHomem">
    <br>
    <span>Digite a quantidade de mulheres que entraram no elevador: </span>
    <input type="text" id="ipt_qtdMulher">
    <br>
    <button onclick="analisar()">Analisar Peso</button>
    <div id="exibir"></div>
</body>
</html>
<script>
    
    function analisar(){
        exibir.innerHTML = ""
        let estimativa_homem = Number(ipt_qtdHomem.value)*80 
        let estimativa_mulher = Number(ipt_qtdMulher.value)*60 
        let estimativa_total = estimativa_homem + estimativa_mulher

        exibir.innerHTML = `Este elevador suporta 800 Kg e o peso estimado desta lotação é de ${estimativa_total}kg`

        if(estimativa_total > 800){
            exibir.innerHTML += `<p style = "color: blue">Será necessário que alguém desça para que o elevador se movimente!</p>`
        }
    }
</script>
