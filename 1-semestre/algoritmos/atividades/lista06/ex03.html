<!-- 
3. Simulador de Preço do Bilhete Único de São Paulo

Crie um pequeno simulador de preço de passagem de Bilhete Único de São Paulo num programa, o qual: 

a) Tenha uma combo para indicar o tipo de passageiro, com os itens 

            Comum 
            Estudante 
            Idoso/PNE 

b) Tenha uma outra combo, para indicar o tipo de passagem, com os itens 

            Passagem única 
            Passagem integração 

c) Ao clicar num botão "Simular preço", considere que o preço unitário de uma passagem única é R$4,40 e que a integração é R$5,90 para fazer os cálculos necessários para exibir uma frase como esta: 

            Valor da passagem escolhida: R$X,XX 

d) Considere ainda que um estudante tem 50% de desconto e idoso/PNE possuem gratuidade em qualquer tipo de passagem 
 -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
 </head>
 <body>
    <h1>3. Simulador de Preço do Bilhete Único de São Paulo</h1>
    <span>Digite o tipo de passageiro: </span>
    <!-- <input type="text" id="ipt_passageiro"> -->
     <select name="" id="select_passageiro">
        <option value="">Selecione uma opção</option>
        <option value="Comum">Comum</option>
        <option value="Estudante">Estudante</option>
        <option value="Idoso/PNE">Idoso/PNE</option>
     </select>
     <br>
    <span>Digite o tipo de passagem: </span>
    <!-- <input type="text" id="ipt_passagem"> -->
     <select name="" id="select_passagem">
        <option value="">Selecione uma opção</option>
        <option value="Passagem única">Passagem única</option>]
        <option value="Passagem integração">Passagem integração</option>
     </select>
     <br>
    <button onclick="verificar()">Cotar</button>
    <div id="div_mensagem"></div>
 </body>
 </html>
 <script>
    function verificar(){
        div_mensagem.innerHTML = ""
        let passageiro = select_passageiro.value
        let passagem = select_passagem.value
        let preco

        if(passageiro == "Comum" && passagem == "Passagem única"){
            preco = 4.40
        }else if(passageiro == "Comum" && passagem == "Passagem integração"){
            preco = 5.90
        }else if(passageiro == "Estudante" && passagem == "Passagem única"){
            preco = 2.20
        }else if(passageiro == "Estudante" && passagem == "Passagem integração"){
            preco = 2.95
        }else if(passageiro == "Idoso/PNE"){
            preco = 0
        }else{
            alert("Entrada inválida")
        }

        div_mensagem.innerHTML = `Valor da passagem escolhida: R$${preco.toFixed(2)}`

    }
 </script>
